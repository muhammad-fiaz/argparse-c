name: Bug Report
description: Report a bug in argparse-c
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: argparse-c version
      description: "Which version of argparse-c are you using?"
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler
      description: "Which compiler and version?"
      placeholder: "e.g., GCC 12.2, Clang 15.0, MSVC 2022"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: "A clear and concise description of the bug."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: "Minimal steps or code to reproduce the behavior."
      placeholder: |
        1. Create parser with...
        2. Parse arguments...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened? Include error messages if applicable."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: "Any additional environment details."
      placeholder: |
        - Build system: CMake / Make
        - Build type: Debug / Release
        - Sanitizers: None / ASAN / UBSAN
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Any other context about the problem."
    validations:
      required: false

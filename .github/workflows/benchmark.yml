name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'benchmarks/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'benchmarks/**'
  workflow_dispatch:

jobs:
  benchmark:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++

          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DARGPARSE_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run benchmarks
        run: ./build/benchmarks/bench_argparse

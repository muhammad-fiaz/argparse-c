name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux GCC
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            build_type: Debug
            sanitizer: none

          - name: Linux GCC Release
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizer: none

          # Linux Clang
          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizer: none

          - name: Linux Clang ASAN
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizer: address

          - name: Linux Clang UBSAN
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizer: undefined

          # macOS
          - name: macOS Clang
            os: macos-latest
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizer: none

          # Windows MSVC
          - name: Windows MSVC
            os: windows-latest
            cc: cl
            cxx: cl
            build_type: Debug
            sanitizer: none

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja

      - name: Configure (CMake)
        shell: bash
        run: |
          CMAKE_ARGS=""
          if [ "${{ matrix.cc }}" != "cl" ]; then
            CMAKE_ARGS="-DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}"
          fi

          SANITIZER_ARGS=""
          if [ "${{ matrix.sanitizer }}" = "address" ]; then
            SANITIZER_ARGS="-DCMAKE_C_FLAGS=-fsanitize=address -DCMAKE_CXX_FLAGS=-fsanitize=address -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address"
          elif [ "${{ matrix.sanitizer }}" = "undefined" ]; then
            SANITIZER_ARGS="-DCMAKE_C_FLAGS=-fsanitize=undefined -DCMAKE_CXX_FLAGS=-fsanitize=undefined -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=undefined"
          fi

          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DARGPARSE_BUILD_TESTS=ON \
            -DARGPARSE_BUILD_EXAMPLES=ON \
            -DARGPARSE_WERROR=ON \
            ${CMAKE_ARGS} \
            ${SANITIZER_ARGS}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  clang-tidy:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tidy

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DARGPARSE_BUILD_TESTS=ON \
            -DCMAKE_C_CLANG_TIDY=clang-tidy \
            -DCMAKE_CXX_CLANG_TIDY=clang-tidy

      - name: Build
        run: cmake --build build --parallel

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcovr

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DARGPARSE_BUILD_TESTS=ON \
            -DARGPARSE_BUILD_EXAMPLES=ON \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: gcovr --root . --filter src/ --filter include/ --xml -o coverage.xml build

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

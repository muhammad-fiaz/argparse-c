name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## Installation

            ### CMake FetchContent
            ```cmake
            FetchContent_Declare(
              argparse-c
              GIT_REPOSITORY https://github.com/muhammad-fiaz/argparse-c.git
              GIT_TAG ${{ github.ref_name }}
            )
            ```

            ### From Source
            ```bash
            git clone --branch ${{ github.ref_name }} https://github.com/muhammad-fiaz/argparse-c.git
            cd argparse-c
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --parallel
            sudo cmake --install build
            ```
          generate_release_notes: true
